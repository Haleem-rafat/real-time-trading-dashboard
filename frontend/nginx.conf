server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip text assets
    gzip               on;
    gzip_vary          on;
    gzip_min_length    1024;
    gzip_proxied       any;
    gzip_comp_level    6;
    gzip_types         text/plain
                       text/css
                       text/javascript
                       application/javascript
                       application/json
                       application/xml
                       image/svg+xml;

    # Long-lived caching for hashed Vite assets
    location /assets/ {
        expires      1y;
        access_log   off;
        add_header   Cache-Control "public, immutable";
        try_files    $uri =404;
    }

    # REST API → backend
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Socket.IO (long-lived WebSocket upgrade) → backend
    location /socket.io/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SPA fallback — every other route returns index.html so the
    # React Router can take over client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache the entry document so deploys take effect immediately
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dark rounded square background matching app surface color -->
  <rect width="64" height="64" rx="14" fill="#0a0a0f"/>
  <!-- Subtle inner border -->
  <rect x="0.75" y="0.75" width="62.5" height="62.5" rx="13.25" fill="none" stroke="#1f1f2e" stroke-width="1.5"/>
  <!-- Pulse / chart line in brand cyan -->
  <polyline
    points="10,40 20,40 26,52 38,12 44,40 54,40"
    fill="none"
    stroke="#00d4ff"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Small green up-tick dot at the line's right end -->
  <circle cx="54" cy="40" r="3" fill="#00ff88"/>
</svg>

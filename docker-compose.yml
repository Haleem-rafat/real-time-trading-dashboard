services:
  mongo:
    image: mongo:7
    container_name: trading-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trading

  redis:
    image: redis:7-alpine
    container_name: trading-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trading

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trading-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "8080"
      MONGODB_URL: mongodb://root:example@mongo:27017/trading?authSource=admin
      MONGODB_DB_NAME: trading
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me-in-prod-please-use-a-long-random-string
      JWT_EXPIRES: 24h
      # Allow both the dockerised frontend (port 5173) and local Vite dev (5173/5174)
      FRONTEND_URL: http://localhost:5173,http://localhost:5174
      ALLOW_ANON_WS: "true"
      TICK_INTERVAL_MS: "1000"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - trading

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Relative paths → nginx (in this same container) proxies them
        # to the backend service. No CORS, no host hard-coding.
        VITE_API_URL: /api/v1
        VITE_SOCKET_URL: /
    container_name: trading-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - trading

volumes:
  mongo_data:
  redis_data:

networks:
  trading:
    driver: bridge
